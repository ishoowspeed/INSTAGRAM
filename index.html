<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="style.css" />

  <header class="topbar">

  <div class="zakladki">

    <button class="zakladka" onclick="pokazZakladke('aktualnosci', this)">📢 Nowości</button>

  <main class="siatka" id="siatka">

    <div class="komorka" onclick="otworz(0)">
      <img src="zdjecie1.png" alt="Zdjęcie 1" onerror="this.style.display='none'; this.parentElement.classList.add('brak')" />

    </div>

  </main>

  <section class="aktualnosci-lista" id="aktualnosci" style="display:none">

    <div class="ogloszenie">
      <div class="ogloszenie-data">18.06.2025</div>
      <div class="ogloszenie-tresc">AKTULIZACJA! <br>- Dodano nowego mema.<br>- Dodano zakładke Nowości</div>
    </div>

  </section>

  <div class="modal-tlo" id="modalTlo">

      <button class="zamknij" onclick="zamknij()">✕</button>

      <div class="modal-zdjecie-obszar" id="modalZdjecieObszar"></div>

      <div class="modal-info">
        <div class="modal-gora">
          <div class="avatar">PS</div>
          <span class="nazwa-uzytkownika">PASIUK</span>
        </div>
        <div class="modal-akcje">
          <button class="serce" id="serceBtn" onclick="polub()">♡ 8433</button>
          <span>💬</span>
          <span>✉</span>
          <p class="podpis">
  <strong>galeria</strong>
  <span id="modalNapis">Zdjęcie</span>
</p>


    </div>
  </div>

  <nav class="dolny-pasek">
    <span>🏠</span>
    <span>🔍</span>
    <span>➕</span>
    <span>👤</span>
  </nav>

  <script src="script.js"></script>
</body>
</html>
