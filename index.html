<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galeria Rudego</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="topbar">
    <span class="logo">📷 Galeria RUDEGO</span>
    <span class="ikony">♡ &nbsp; ✉</span>
  </header>

  <main class="siatka" id="siatka">
    <div class="komorka" onclick="otworz(0)">
      <img src="zdjecie1.png" alt="Zdjęcie 1" onerror="this.style.display='none'; this.parentElement.classList.add('brak')" />
      <div class="napis-zastepczy">ZDJĘCIE 1</div>
    </div>

    <div class="komorka" onclick="otworz(1)">
      <img src="zdjecie2.jpg" alt="Zdjęcie 2" onerror="this.style.display='none'; this.parentElement.classList.add('brak')" />
      <div class="napis-zastepczy">ZDJĘCIE 2</div>
    </div>

    <div class="komorka" onclick="otworz(2)">
      <img src="zdjecie3.jpg" alt="Zdjęcie 3" onerror="this.style.display='none'; this.parentElement.classList.add('brak')" />
      <div class="napis-zastepczy">ZDJĘCIE 3</div>
    </div>

    <div class="komorka" onclick="otworz(3)">
      <img src="zdjecie4.jpg" alt="Zdjęcie 4" onerror="this.style.display='none'; this.parentElement.classList.add('brak')" />
      <div class="napis-zastepczy">ZDJĘCIE 4</div>
    </div>

    <div class="komorka" onclick="otworz(4)">
      <img src="zdjecie5.jpg" alt="Zdjęcie 5" onerror="this.style.display='none'; this.parentElement.classList.add('brak')" />
      <div class="napis-zastepczy">ZDJĘCIE 5</div>
    </div>

  </main>

  <div class="modal-tlo" id="modalTlo">
    <div class="modal-okno">

      <button class="zamknij" onclick="zamknij()">✕</button>

      <div class="modal-zdjecie-obszar" id="modalZdjecieObszar">
      </div>

      <div class="modal-info">
        <div class="modal-gora">
          <div class="avatar">GG</div>
          <span class="nazwa-uzytkownika">galeria</span>
        </div>
        <div class="modal-akcje">
          <button class="serce" id="serceBtn" onclick="polub()">♡</button>
          <span>💬</span>
          <span>✉</span>
        </div>
        <p class="podpis">
          <strong>galeria</strong>
          <span id="modalNapis">Zdjęcie</span>
        </p>
      </div>

    </div>
  </div>

  <nav class="dolny-pasek">
    <span>🏠</span>
    <span>🔍</span>
    <span>➕</span>
    <span>👤</span>
  </nav>

  <script src="script.js"></script>
</body>
</html>
